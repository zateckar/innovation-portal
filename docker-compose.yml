services:
  innovation-radar:
    image: ghcr.io/zateckar/innovation-portal:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - DATABASE_PATH=/app/data/innovation-radar.db
      - SESSION_SECRET=${SESSION_SECRET:-change-this-in-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-http://localhost:${PORT:-3000}}
      # Initial admin user (created on first startup if no admin exists)
      - INIT_ADMIN_EMAIL=${INIT_ADMIN_EMAIL:-}
      - INIT_ADMIN_PASSWORD=${INIT_ADMIN_PASSWORD:-}
      - INIT_ADMIN_NAME=${INIT_ADMIN_NAME:-Admin}
      # OpenCode builder configuration (uses the same Gemini key)
      - OPENCODE_API_KEY=${GEMINI_API_KEY}
    volumes:
      - innovation-data:/app/data
      - innovation-workspaces:/app/workspaces
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:' + process.env.PORT + '/api/health').then(r => process.exit(r.status === 200 ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  innovation-data:
    driver: local
  innovation-workspaces:
    driver: local

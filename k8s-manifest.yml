apiVersion: v1
kind: Pod
metadata:
  name: innovation-portal
  namespace: innovation-portal
  labels:
    app: innovation-portal
spec:
  containers:
    - name: innovation-portal
      image: ghcr.io/zateckar/innovation-portal:latest
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 3000
          name: http
      env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DATABASE_PATH
          value: "/app/data/innovation-radar.db"
        - name: PUBLIC_APP_URL
          value: "http://localhost:3000"
        - name: SESSION_SECRET
          value: "kdiisjog5bEvbjIpVQd12"
        - name: GEMINI_API_KEY
          value: ""
        - name: INIT_ADMIN_EMAIL
          value: "admin@example.com"
        - name: INIT_ADMIN_PASSWORD
          value: ""
        - name: INIT_ADMIN_NAME
          value: "Admin"
      volumeMounts:
        - name: innovation-data
          mountPath: /app/data
      livenessProbe:
        httpGet:
          path: /api/health
          port: 3000
        initialDelaySeconds: 10
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /api/health
          port: 3000
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
  volumes:
    - name: innovation-data
      hostPath:
        path: ./data
        type: DirectoryOrCreate
  restartPolicy: Always
